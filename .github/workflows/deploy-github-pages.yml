name: Deploy Sweep Desk to GitHub Pages

on:
  push:
    branches: [main, claude/multi-platform-deployment-p2e2f7]
    paths:
      - 'public/sweepdesk/**'
      - '.github/workflows/deploy-github-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/sweepdesk
      - id: deployment
        uses: actions/deploy-pages@v4
