<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sweep Desk — Receivables Coaching Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="./xlsx.full.min.js"></script>
<script>if(typeof XLSX==='undefined')document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');</script>
<script src="./config.js"></script>
<style>
:root{
  --ink:#0F1319; --panel:#161C25; --panel2:#1D2430; --line:#2A3240; --line2:#374253;
  --paper:#EDF1F6; --muted:#8B95A7; --dim:#5E6A7C;
  --cyan:#3DD6C4; --cyan-dim:#1F7F76; --cyan-bg:#0E2C29;
  --red:#F0484F; --red-bg:#38141A;
  --amber:#FFB224; --amber-bg:#372A0E;
  --violet:#9A7CF0; --violet-bg:#221B3B;
  --blue:#54A6FF; --blue-bg:#122335;
  --grey-bg:#222A35;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--paper);font-family:'Inter',system-ui,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
h1,h2,h3,.disp{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
::selection{background:var(--cyan);color:var(--ink)}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ---------- sign in ---------- */
.signin{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1200px 600px at 50% -10%,rgba(61,214,196,.07),transparent 70%)}
.signin .box{width:100%;max-width:390px}
.signin .mark{text-align:center;margin-bottom:26px}
.signin .mark h1{font-size:27px;display:flex;align-items:center;justify-content:center;gap:9px}
.signin .mark .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
.signin .mark p{color:var(--dim);font-size:12.5px;margin-top:5px}
.who-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.who{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:9px;
  background:var(--panel);border:1px solid var(--line);text-align:left;transition:.12s}
.who:hover{border-color:var(--cyan-dim);background:var(--panel2)}
.who .n{font-weight:600;font-size:13.5px}
.who .r{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-top:1px}
.who .go{color:var(--dim);font-size:17px}
.who:hover .go{color:var(--cyan)}

/* ---------- shell ---------- */
.app{display:grid;grid-template-columns:236px 1fr;height:100vh}
.rail{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:19px 18px 15px;border-bottom:1px solid var(--line)}
.brand h1{font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.brand p{font-size:10.5px;color:var(--dim);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
.nav{padding:10px;flex:1}
.nav button{width:100%;text-align:left;padding:9px 12px;border-radius:8px;color:var(--muted);
  display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:500;margin-bottom:2px}
.nav button:hover{background:var(--panel2);color:var(--paper)}
.nav button.on{background:var(--panel2);color:var(--paper);box-shadow:inset 2px 0 0 var(--cyan)}
.nav .pill{font-size:11px;padding:1px 7px;border-radius:20px;background:var(--grey-bg);color:var(--muted);font-family:'JetBrains Mono'}
.nav .pill.red{background:var(--red-bg);color:var(--red)}
.nav .pill.amber{background:var(--amber-bg);color:var(--amber)}
.nav .pill.cyan{background:var(--cyan-bg);color:var(--cyan)}
.nav .sep{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.11em;padding:15px 12px 6px;font-weight:600}
.me{padding:12px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:50%;background:var(--cyan-bg);color:var(--cyan);
  display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0}
.me .nm{font-size:12.5px;font-weight:600;line-height:1.2}
.me .rl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.me .out{margin-left:auto;color:var(--dim);font-size:11px}
.me .out:hover{color:var(--red)}

.main{overflow-y:auto;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(15,19,25,.93);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.topbar h2{font-size:17px;font-weight:600}
.topbar .sub{font-size:12px;color:var(--dim);margin-top:1px}
.rulechip{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
  padding:7px 13px;border-radius:20px;font-size:12px;white-space:nowrap}
.rulechip .k{color:var(--dim)}
.rulechip .v{color:var(--cyan);font-weight:700}
.body{padding:22px 24px 40px;flex:1}

/* ---------- generic ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.card h3{font-size:14px;font-weight:600;margin-bottom:4px}
.card .hint{font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.5}
.btn{background:var(--cyan);color:#06231F;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;display:inline-block}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:var(--panel2);color:var(--paper);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--line2);filter:none}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.wide{width:100%;text-align:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
label.f{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;background:var(--ink);border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);outline:none}
textarea{resize:vertical;min-height:70px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row{display:flex;gap:10px;align-items:center}
.spacer{flex:1}
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty .big{font-family:'Space Grotesk';font-size:18px;color:var(--muted);margin-bottom:6px}

/* ---------- legend: the key to reading everything ---------- */
.key{display:flex;gap:16px;flex-wrap:wrap;align-items:center;background:var(--panel);
  border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin-bottom:16px;font-size:12px}
.key .t{color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:10px}
.key .i{display:flex;align-items:center;gap:6px;color:var(--muted)}
.key .sw{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ---------- intake ---------- */
.drops{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.drop{border:1.5px dashed var(--line);border-radius:12px;padding:32px 20px;text-align:center;
  background:var(--panel);transition:.15s;cursor:pointer}
.drop:hover{border-color:var(--cyan-dim);background:var(--panel2)}
.drop.over{border-color:var(--cyan);background:var(--panel2);box-shadow:0 0 0 3px rgba(61,214,196,.12)}
.drop.has{border-style:solid;border-color:var(--cyan-dim)}
.drop .lab{font-family:'Space Grotesk';font-size:15px;font-weight:600;margin-bottom:3px}
.drop .sub{font-size:12px;color:var(--dim)}
.drop .cnt{margin-top:12px;font-size:12px;color:var(--cyan);font-weight:500}
.files{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{font-size:11px;background:var(--panel2);border:1px solid var(--line);padding:3px 8px;border-radius:20px;color:var(--muted)}

/* ---------- stats ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px}
.stat .n{font-family:'JetBrains Mono';font-size:26px;font-weight:700;line-height:1}
.stat .l{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.35}
.stat.red{border-color:#542126}.stat.red .n{color:var(--red)}
.stat.amber{border-color:#54401C}.stat.amber .n{color:var(--amber)}
.stat.violet .n{color:var(--violet)}
.stat.blue .n{color:var(--blue)}
.stat.cyan .n{color:var(--cyan)}
.stat.clk{cursor:pointer;position:relative;transition:.13s}
.stat.clk:hover{border-color:var(--cyan-dim);transform:translateY(-1px)}
.stat .go{font-size:10.5px;color:var(--dim);margin-top:8px;opacity:0;transition:.13s}
.stat.clk:hover .go{opacity:1;color:var(--cyan)}

/* follow-up calendar */
.calwrap{display:flex;gap:18px;flex-wrap:wrap}
.calmonth{flex:1;min-width:280px}
.caltitle{font-family:'Space Grotesk';font-size:14px;font-weight:600;text-align:center;margin-bottom:10px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.caldow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);
  text-align:center;padding:4px 0;font-weight:600}
.calcell{position:relative;aspect-ratio:1.35;min-height:46px;background:var(--ink);border:1px solid var(--line);
  border-radius:7px;padding:5px 6px;cursor:pointer;transition:.12s}
.calcell:hover{border-color:var(--cyan-dim);background:var(--panel2)}
.calcell.empty{background:transparent;border:none;cursor:default}
.calcell.wknd{background:rgba(0,0,0,.18)}
.calcell.today{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan)}
.calcell.sel{background:var(--panel2);border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan)}
.calcell.off{border-bottom-width:3px}
.caldn{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted)}
.calcell.today .caldn{color:var(--cyan);font-weight:700}
.calbadge{position:absolute;bottom:5px;right:6px;font-family:'JetBrains Mono';font-weight:700;
  font-size:10.5px;padding:1px 6px;border-radius:10px}
.b-over{background:var(--violet-bg);color:var(--violet)}
.b-today{background:var(--amber-bg);color:var(--amber)}
.b-due{background:var(--cyan-bg);color:var(--cyan)}
.calheavy{position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--red);
  box-shadow:0 0 5px var(--red)}
.caloff{position:absolute;left:6px;bottom:6px;width:14px;height:3px;border-radius:2px}
.calatlas{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:14px;padding-top:12px;
  border-top:1px solid var(--line);font-size:11px;color:var(--dim)}
.calatlas .atlas-t{font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-size:10px}
.calatlas .ai{display:flex;align-items:center;gap:6px}
.calatlas .caloff{position:static;display:inline-block}
.btn.on2{background:var(--cyan);color:#06231F}
/* time off */
.offform{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:14px}
.offform select,.offform input{padding:8px 10px;font-size:12.5px}
.offrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.offnote{margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap}

/* action code chip — the thing specialists work from */
.code{display:inline-block;font-family:'JetBrains Mono';font-weight:700;font-size:12.5px;
  padding:4px 10px;border-radius:6px;background:var(--panel2);border:1px solid var(--line2);
  color:var(--paper);letter-spacing:.04em;cursor:pointer;transition:.12s}
.code:hover{border-color:var(--cyan);color:var(--cyan)}
/* pass stepper */
.passes{display:flex;align-items:center;gap:4px}
.passbig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.pbtn{padding:10px 6px;border-radius:8px;border:1.5px solid var(--line2);background:var(--ink);
  font-size:11.5px;font-weight:600;color:var(--muted);transition:.12s}
.pbtn:hover{border-color:var(--cyan);color:var(--paper)}
.pbtn.on{background:var(--cyan);border-color:var(--cyan);color:#06231F}
.pbtn.fin.on{background:#5BC98A;border-color:#5BC98A}
.phist{font-size:11px;color:var(--dim);line-height:1.7;border-left:2px solid var(--line);padding-left:10px;margin-top:8px}
.pdot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line2);background:var(--ink);
  cursor:pointer;padding:0;transition:.12s}
.pdot:hover{border-color:var(--cyan)}
.pdot.on{background:var(--cyan);border-color:var(--cyan)}
.pdot.fin.on{background:var(--red);border-color:var(--red)}
.plab{font-size:10px;color:var(--dim);margin-left:4px;white-space:nowrap;min-width:30px}
/* worked tick */
.tick{display:inline-flex;cursor:pointer;position:relative}
.tick input{position:absolute;opacity:0;width:0;height:0}
.tick .box{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--line2);
  background:var(--ink);display:grid;place-items:center;transition:.12s}
.tick:hover .box{border-color:var(--cyan)}
.tick .box::after{content:'✓';font-size:12px;font-weight:700;color:#06231F;opacity:0;transform:scale(.6);transition:.12s}
.tick input:checked + .box{background:var(--cyan);border-color:var(--cyan)}
.tick input:checked + .box::after{opacity:1;transform:scale(1)}
.tick input:focus-visible + .box{outline:2px solid var(--cyan);outline-offset:2px}
tbody tr.done{opacity:.52}
tbody tr.done:hover{opacity:1}

/* ---------- table ---------- */
.tools{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.tools input[type=text],.tools select{width:auto;min-width:150px;padding:7px 10px;font-size:12px}
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:auto;max-height:calc(100vh - 350px)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel2);z-index:2;text-align:left;padding:10px 12px;
  font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;
  border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--paper)}
thead th .ar{color:var(--cyan);margin-left:3px}
tbody td{padding:10px 12px;border-bottom:1px solid rgba(42,50,64,.55);vertical-align:top}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--panel2)}
tbody tr.f-past{background:rgba(240,72,79,.07);box-shadow:inset 3px 0 0 var(--red)}
tbody tr.f-past:hover{background:rgba(240,72,79,.13)}
tbody tr.f-appr{background:rgba(255,178,36,.055);box-shadow:inset 3px 0 0 var(--amber)}
tbody tr.f-appr:hover{background:rgba(255,178,36,.11)}
tbody tr.f-fu{box-shadow:inset 3px 0 0 var(--violet)}
.tag{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:5px;white-space:nowrap}
.t-past{background:var(--red-bg);color:var(--red)}
.t-appr{background:var(--amber-bg);color:var(--amber)}
.t-fu{background:var(--violet-bg);color:var(--violet)}
.t-stag{background:var(--blue-bg);color:var(--blue)}
.t-none,.t-exc{background:var(--grey-bg);color:var(--dim)}
.t-ok{background:var(--cyan-bg);color:var(--cyan)}

/* SIGNATURE — the sweep clock */
.clock{display:flex;align-items:center;gap:8px;min-width:118px}
.clock .d{font-family:'JetBrains Mono';font-size:13px;font-weight:700;width:28px;text-align:right}
.clock .track{flex:1;height:4px;background:var(--grey-bg);border-radius:2px;overflow:hidden}
.clock .fill{height:100%;border-radius:2px}
.clock.past .d{color:var(--red)} .clock.past .fill{background:var(--red)}
.clock.appr .d{color:var(--amber)} .clock.appr .fill{background:var(--amber)}
.clock.ok .d{color:var(--dim)} .clock.ok .fill{background:var(--cyan-dim)}
.clock .u{font-size:10px;color:var(--dim);margin-left:1px}

.miss{color:var(--red);font-weight:600;font-size:11px;margin-top:2px}
.acct{font-family:'JetBrains Mono';font-size:12px}
.xref{color:var(--cyan);font-size:11px}
.todo{color:var(--muted);font-size:12px;line-height:1.4;max-width:270px}

/* note pip in row — how specialists SEE manager guidance */
.pip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:5px;
  background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan-dim);white-space:nowrap;font-weight:600}
.pip.none{background:transparent;color:var(--dim);border:1px dashed var(--line)}
.pip.none:hover{color:var(--cyan);border-color:var(--cyan-dim)}
.notepv{font-size:11.5px;color:var(--muted);margin-top:5px;padding-left:9px;
  border-left:2px solid var(--cyan-dim);line-height:1.45;max-width:270px}
.notepv b{color:var(--cyan);font-weight:600}

/* ---------- alerts ---------- */
.alert{display:flex;gap:13px;align-items:center;padding:14px 16px;border-radius:9px;margin-bottom:9px;
  background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--dim)}
.alert.sev-high{border-left-color:var(--red)}
.alert.sev-med{border-left-color:var(--amber)}
.alert .txt{flex:1}
.alert .who{font-weight:600;font-size:13.5px}
.alert .msg{font-size:12.5px;color:var(--muted);margin-top:2px}
.alert .num{font-family:'JetBrains Mono';font-weight:700;font-size:19px;min-width:38px;text-align:center}
.alert.sev-high .num{color:var(--red)}
.alert.sev-med .num{color:var(--amber)}

/* ---------- bars ---------- */
.bar-row{display:grid;grid-template-columns:145px 1fr 42px;gap:12px;align-items:center;margin-bottom:8px;font-size:12.5px}
.bar-row .nm{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{height:20px;background:var(--grey-bg);border-radius:4px;overflow:hidden;display:flex}
.bar-seg{height:100%}
.bar-row .tot{font-family:'JetBrains Mono';text-align:right;font-weight:600;font-size:12px}

/* ---------- admin ---------- */
.adm-sec>h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--cyan);
  margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.tagin{display:flex;flex-wrap:wrap;gap:6px;background:var(--ink);border:1px solid var(--line);
  border-radius:7px;padding:7px;min-height:40px;align-items:center}
.tagin .tg{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);
  padding:2px 6px 2px 9px;border-radius:5px;font-size:11.5px;font-family:'JetBrains Mono'}
.tagin .tg button{color:var(--dim);font-size:14px;line-height:1;padding:0 2px}
.tagin .tg button:hover{color:var(--red)}
.tagin input{border:none;background:none;flex:1;min-width:80px;padding:2px;font-size:12px}
.tagin input:focus{outline:none}
.map-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:7px}
.map-row .sp{font-size:12.5px;padding:9px 11px;background:var(--ink);border:1px solid var(--line);
  border-radius:7px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset{display:flex;gap:6px}
.preset button{flex:1;padding:10px;border-radius:7px;border:1px solid var(--line);background:var(--ink);
  font-family:'JetBrains Mono';font-weight:600;font-size:13px;color:var(--muted)}
.preset button:hover{border-color:var(--line2);color:var(--paper)}
.preset button.on{background:var(--cyan);color:#06231F;border-color:var(--cyan)}
.urow{display:grid;grid-template-columns:1fr 110px 120px 34px;gap:8px;align-items:center;margin-bottom:7px}
.urow .rb{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;
  padding:8px;border-radius:6px;text-align:center}
.rb-admin{background:var(--cyan-bg);color:var(--cyan)}
.rb-manager{background:var(--violet-bg);color:var(--violet)}
.rb-specialist{background:var(--grey-bg);color:var(--muted)}
.warn{background:var(--amber-bg);border:1px solid #54401C;color:#FFD98A;padding:12px 14px;
  border-radius:8px;font-size:12px;margin-bottom:16px;line-height:1.6}
.warn b{color:var(--amber)}

/* ---------- modal / notes thread ---------- */
.mask{position:fixed;inset:0;background:rgba(5,8,12,.74);backdrop-filter:blur(3px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:560px;
  max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.55)}
.modal header{padding:17px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.modal header h3{font-size:16px}
.modal header .m{font-size:12px;color:var(--dim);margin-top:2px;font-family:'JetBrains Mono'}
.modal .cnt{padding:20px;overflow-y:auto;flex:1}
.modal footer{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:9px;align-items:center}
.x{font-size:21px;color:var(--dim);line-height:1}
.x:hover{color:var(--paper)}
.kv{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;font-size:12.5px;margin-bottom:16px}
.kv dt{color:var(--dim)}
.kv dd{font-family:'JetBrains Mono';font-size:12px}
.callout{padding:11px 13px;border-radius:8px;font-size:12.5px;margin-bottom:16px;line-height:1.5}
.co-past{background:var(--red-bg);border:1px solid #542126;color:#FFB3B7}
.co-appr{background:var(--amber-bg);border:1px solid #54401C;color:#FFD98A}
.co-fu{background:var(--violet-bg);border:1px solid #362B58;color:#CFC0FF}
.co-stag{background:var(--blue-bg);border:1px solid #1E3A56;color:#B3D9FF}
.thread{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.msg{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px}
.msg .hd{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.msg .au{font-size:12px;font-weight:600}
.msg .rl{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--cyan);font-weight:600}
.msg .ts{font-size:10.5px;color:var(--dim);margin-left:auto}
.msg .tx{font-size:12.5px;color:var(--paper);line-height:1.5;white-space:pre-wrap}
.msg .del{color:var(--dim);font-size:14px;line-height:1}
.msg .del:hover{color:var(--red)}
.nothread{font-size:12.5px;color:var(--dim);text-align:center;padding:18px;
  border:1px dashed var(--line);border-radius:9px;margin-bottom:16px}
.toast{position:fixed;bottom:22px;right:22px;background:var(--panel2);border:1px solid var(--cyan-dim);
  padding:11px 17px;border-radius:9px;font-size:13px;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.45);animation:up .2s}
@keyframes up{from{opacity:0;transform:translateY(8px)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:900px){.app{grid-template-columns:1fr}.rail{display:none}.drops,.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
/* ============================================================
   STATE
   ============================================================ */
const S = {
  user: null,                    // {name, role, desk}
  page: 'flags',
  today: [], yesterday: [], xref: [],
  todayFiles: [], yestFiles: [], xrefFiles: [],
  threads: {},                   // acct -> [{author, role, text, status, at}]
  passes: {},                    // acct -> {n:0..4, hist:[{n,by,at}]}
  worked: {},                    // acct -> {by, at}  — specialist's "handled today" checkmark
  archive: [],                   // every upload: {at, by, kind, files, count, rows?}
  sort: {key:'_prio', dir:1},
  calBase: null, calSel: null,   // follow-up calendar month + selected day
  calTwin: false,                // show two months side by side
  timeOff: [],                   // [{who, start, end, kind, note}]
  filters: {q:'', desk:'', flag:'', mgr:'', pass:'', code:'', worked:''},
  cfg: {
    sweepDays: 30,
    warnDays: 14,
    excluded: ['PPA','PIF','SIF'],
    sweptOnly: ['CNP','PNC','SPNPNC','SPNCNP'],
    managers: {},
    alerts: {past:15, appr:60, fu:40, stag:50},
    xrefKey: 'Account #',
    users: [
      {name:'Tony',    role:'Admin',      pin:'admin1', desk:''},
      {name:'Heather',  role:'Specialist', pin:'1017', desk:''},
      {name:'Kyle',     role:'Specialist', pin:'6960', desk:''},
      {name:'Isabel',   role:'Specialist', pin:'3325', desk:''},
      {name:'Angela',   role:'Specialist', pin:'1001', desk:''},
      {name:'Samantha', role:'Specialist', pin:'7754', desk:''},
      {name:'Sara',     role:'Specialist', pin:'6283', desk:''},
      {name:'Hannah',   role:'Specialist', pin:'4265', desk:''},
      {name:'Cynthia',  role:'Specialist', pin:'1689', desk:''},
      {name:'Erica',    role:'Specialist', pin:'5590', desk:''},
    ],
  }
};
const ROLES = ['Admin','Manager','Specialist'];
const F = {PAST:'PAST THE RULE', APPR:'APPROACHING', FU:'FOLLOW-UP OVERDUE', STAG:'STAGNANT', NONE:'', EXC:'EXCLUDED', NODATE:'NO TOUCH DATE'};
const PRIO = {[F.PAST]:1,[F.APPR]:2,[F.FU]:3,[F.STAG]:4,[F.NODATE]:5,[F.NONE]:6,[F.EXC]:7};
const STATUSES = ['Needs coaching','Coached — watching','Escalated','Resolved'];

const isAdmin   = () => S.user?.role==='Admin';
const isManager = () => S.user?.role==='Admin' || S.user?.role==='Manager';
const canCoach  = () => isManager();

/* ============================================================
   PARSE (handles text dates, real dates, and serials)
   ============================================================ */
const norm = s => String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
const HEAD = {
  desk:['desk'], assignee:['assignee'], acct:['account','accountnumber','acct'],
  age:['accountage','age'], status:['status'], name:['name','residentname'],
  lastWorked:['lastworked'], lastContact:['lastcontactmade','lastcontact'],
  followUp:['followupon','followup'], balance:['currentbalance','balance'], property:['property']
};
function mapHeaders(hdr){
  const m={};
  hdr.forEach((h,i)=>{ const n=norm(h);
    for(const [k,alts] of Object.entries(HEAD)){
      if(m[k]!==undefined) continue;
      if(alts.some(a=>n===a||n.startsWith(a))) m[k]=i;
    }});
  return m;
}
function toDate(v){
  if(v===null||v===undefined||v==='') return null;
  if(v instanceof Date && !isNaN(v)) return new Date(v.getFullYear(),v.getMonth(),v.getDate());
  if(typeof v==='number'){ const d=new Date(Math.round((v-25569)*86400000));
    return isNaN(d)?null:new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()); }
  const s=String(v).trim(); if(!s) return null;
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){ let y=+m[3]; if(y<100) y+=2000; return new Date(y,+m[1]-1,+m[2]); }
  const d=new Date(s); return isNaN(d)?null:new Date(d.getFullYear(),d.getMonth(),d.getDate());
}
const fmt = d => d ? String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+'/'+d.getFullYear() : '—';
const money = n => (n==null||isNaN(n)) ? '—' : '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const today0 = () => { const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); };
const ago = iso => {
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return 'just now'; if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
};

async function readSheet(file){
  const wb = XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true});
  const sh = wb.SheetNames.find(n=>/detail/i.test(n)) || wb.SheetNames[0];
  const aoa = XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:false,cellDates:true,defval:''});
  let hi = aoa.findIndex(r=>r.some(c=>['account','accountnumber','acct'].includes(norm(c))));
  if(hi<0) hi=0;
  const m = mapHeaders(aoa[hi]); const rows=[];
  for(let i=hi+1;i<aoa.length;i++){
    const r=aoa[i]; if(!r||!r.length) continue;
    const acct = m.acct!==undefined ? String(r[m.acct]||'').trim() : '';
    if(!acct || /^total/i.test(acct) || /^total/i.test(String(r[0]||''))) continue;
    const bal = parseFloat(String(r[m.balance]??'').replace(/[$,]/g,''));
    rows.push({ acct,
      desk:String(r[m.desk]??'').trim(), assignee:String(r[m.assignee]??'').trim(),
      name:String(r[m.name]??'').trim(), status:String(r[m.status]??'').trim().toUpperCase(),
      age:parseInt(r[m.age])||null, balance:isNaN(bal)?null:bal,
      lastWorked:toDate(r[m.lastWorked]), lastContact:toDate(r[m.lastContact]),
      followUp:toDate(r[m.followUp]), property:String(r[m.property]??'').trim() });
  }
  return rows;
}
async function readXref(file){
  const wb = XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true});
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{raw:false,defval:''}).map(r=>({...r,_src:file.name}));
}

/* ============================================================
   ENGINE
   ============================================================ */
let R = {rows:[], visible:[], specs:[], alerts:[], swept:[]};
function compute(){
  const T=today0(), C=S.cfg;
  const yMap = new Map(S.yesterday.map(r=>[r.acct,r]));
  const xKey = norm(C.xrefKey), xMap = new Map();
  S.xref.forEach(r=>{
    const k = Object.keys(r).find(k=>norm(k)===xKey||norm(k).startsWith('account'));
    if(k && r[k]!=='') xMap.set(String(r[k]).trim(), r);
  });
  return S.today.map(r=>{
    const o={...r};
    const touch=[r.lastWorked,r.lastContact].filter(Boolean).sort((a,b)=>b-a)[0]||null;
    o.lastTouch=touch;
    o.days = touch ? Math.round((T-touch)/86400000) : null;
    const y=yMap.get(r.acct);
    o.stagnant = !!(y && y.lastWorked?.getTime()===r.lastWorked?.getTime());
    o.fuOverdue = !!(r.followUp && r.followUp<T);
    o.mismatch = !!(r.desk && r.assignee && r.desk.trim()!==r.assignee.trim());
    o.noAssignee = !r.assignee;
    o.xref = xMap.get(r.acct)||null;

    if(C.excluded.includes(r.status)) o.flag=F.EXC;
    else if(o.days===null) o.flag=F.NODATE;
    else if(o.days>C.sweepDays) o.flag=F.PAST;
    else if(o.days>=C.sweepDays-C.warnDays) o.flag=F.APPR;
    else if(o.fuOverdue) o.flag=F.FU;
    else if(o.stagnant) o.flag=F.STAG;
    else o.flag=F.NONE;

    o.atRisk = (o.flag===F.PAST||o.flag===F.APPR)?(r.balance||0):0;
    o.left = o.days===null?null:(C.sweepDays+1-o.days);
    o._prio = PRIO[o.flag]*1e6 + (o.days===null?0:(1000-Math.min(o.days,999)));
    o.mgr = C.managers[r.desk]||'';
    o.thread = S.threads[r.acct]||[];
    o.noteStatus = o.thread.length ? o.thread[o.thread.length-1].status : null;
    const P = S.passes[r.acct];
    o.pass = P ? P.n : 0;
    o.passInfo = P || null;
    o.worked = S.worked[r.acct] || null;

    o.todo =
      o.flag===F.PAST ? `Past the ${C.sweepDays}-day rule by ${o.days-C.sweepDays} day${o.days-C.sweepDays===1?'':'s'}. Should already be in RDA — escalate today.` :
      o.flag===F.APPR ? `Sweeps in ${o.left} day${o.left===1?'':'s'}. Work it before it leaves the desk.` :
      o.flag===F.FU   ? `Follow-up was promised for ${fmt(r.followUp)} and hasn't happened.` :
      o.flag===F.STAG ? `Nothing logged on this account since yesterday.` :
      o.flag===F.NODATE ? `No last-worked or last-contact date on record.` : '';
    return o;
  });
}
function scope(rows){                    // specialists only see their own desk
  if(S.user?.role==='Specialist' && S.user.desk)
    return rows.filter(r=>r.desk===S.user.desk);
  return rows;
}
function sweptRows(){
  const C=S.cfg, tSet=new Set(S.today.map(r=>r.acct));
  return scope(S.yesterday.map(r=>({...r,mgr:C.managers[r.desk]||''})))
    .filter(r=>C.sweptOnly.includes(r.status))
    .map(r=>({...r, gone:!tSet.has(r.acct),
      lastTouch:[r.lastWorked,r.lastContact].filter(Boolean).sort((a,b)=>b-a)[0]||null}))
    .sort((a,b)=>(b.gone-a.gone)||((b.balance||0)-(a.balance||0)));
}
function specialists(rows){
  const m=new Map();
  rows.forEach(r=>{ if(!r.desk) return;
    if(!m.has(r.desk)) m.set(r.desk,{desk:r.desk,mgr:r.mgr,total:0,past:0,appr:0,fu:0,stag:0,noAsg:0,risk:0});
    const s=m.get(r.desk); s.total++;
    if(r.flag===F.PAST)s.past++; if(r.flag===F.APPR)s.appr++;
    if(r.flag===F.FU)s.fu++; if(r.flag===F.STAG)s.stag++;
    if(r.noAssignee)s.noAsg++; s.risk+=r.atRisk;
  });
  return [...m.values()].sort((a,b)=>(b.past+b.appr)-(a.past+a.appr));
}
function buildAlerts(specs){
  const A=S.cfg.alerts, out=[];
  specs.forEach(s=>{
    if(s.past>=A.past) out.push({sev:'high',who:s.desk,n:s.past,msg:`accounts past the ${S.cfg.sweepDays}-day rule, still sitting on the desk`});
    if(s.appr>=A.appr) out.push({sev:'med',who:s.desk,n:s.appr,msg:`accounts inside the ${S.cfg.warnDays}-day warning window`});
    if(s.fu>=A.fu)   out.push({sev:'med',who:s.desk,n:s.fu,msg:`follow-ups promised and missed`});
    if(s.stag>=A.stag) out.push({sev:'med',who:s.desk,n:s.stag,msg:`accounts with no activity since yesterday`});
  });
  return out.sort((a,b)=>(a.sev==='high'?0:1)-(b.sev==='high'?0:1)||b.n-a.n);
}
function refresh(){
  persist();
  if(!S.user){ renderSignin(); return; }
  const all = compute();
  R.rows = all;
  R.visible = scope(all);
  R.specs = specialists(R.visible);
  R.alerts = buildAlerts(specialists(scope(all)));
  R.swept = sweptRows();
  renderApp();
}

/* ============================================================
   SIGN IN
   ============================================================ */
const $ = s => document.querySelector(s);
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials = n => n.split(/\s+/).map(x=>x[0]).slice(0,2).join('').toUpperCase();

function renderSignin(){
  $('#root').innerHTML = `
  <div class="signin"><div class="box">
    <div class="mark">
      <h1><span class="dot"></span>Sweep Desk</h1>
      <p>Sign in to your desk</p>
    </div>
    <label class="f">Your name</label>
    <select id="who-sel" style="margin-bottom:14px" onchange="onWhoPick(this.value)">
      <option value="">— choose your name —</option>
      ${S.cfg.users.map((u,i)=>`<option value="${i}">${esc(u.name)} · ${esc(u.role)}${u.desk?' · '+esc(u.desk):''}</option>`).join('')}
    </select>
    <div id="pin-wrap" style="display:none">
      <label class="f">PIN</label>
      <input type="password" id="pin" placeholder="Enter your PIN" autocomplete="off"
        style="text-align:center;font-size:16px;letter-spacing:.12em;margin-bottom:10px">
      <div id="pin-err" style="color:var(--red);font-size:12px;margin-bottom:10px;display:none">That PIN doesn't match.</div>
      <button class="btn" style="width:100%" onclick="doSignin(+$('#who-sel').value)">Sign in</button>
    </div>
    <p style="font-size:11.5px;color:var(--dim);text-align:center;line-height:1.6;margin-top:14px">
      Don't see your name? Ask your admin to add you.
    </p>
  </div></div>`;
}
window.onWhoPick = v => {
  const wrap=$('#pin-wrap');
  if(v===''){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  const p=$('#pin'); p.value=''; $('#pin-err').style.display='none';
  p.focus(); p.onkeydown=e=>{ if(e.key==='Enter') doSignin(+v); };
};
window.doSignin = i => {
  const u=S.cfg.users[i];
  if($('#pin').value.trim() !== String(u.pin).trim()){ $('#pin-err').style.display='block'; $('#pin').value=''; $('#pin').focus(); return; }
  S.user = {...u};
  S.page = S.today.length ? 'flags' : 'intake';
  closeModal(); toast(`Signed in as ${u.name}`); refresh();
};
window.signout = () => { S.user=null; S.filters={q:'',desk:'',flag:'',mgr:'',pass:'',code:'',worked:''}; refresh(); };

/* ============================================================
   APP SHELL
   ============================================================ */
function renderApp(){
  $('#root').innerHTML = `
  <div class="app">
    <aside class="rail">
      <div class="brand"><h1><span class="dot"></span>Sweep Desk</h1><p>Receivables Coaching</p></div>
      <nav class="nav" id="nav"></nav>
      <div class="me">
        <div class="av">${initials(S.user.name)}</div>
        <div><div class="nm">${esc(S.user.name)}</div><div class="rl">${esc(S.user.role)}</div></div>
        <button class="out" onclick="signout()">Sign out</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div><h2 id="pg-title"></h2><div class="sub" id="pg-sub"></div></div>
        <div class="row">
          <div class="rulechip"><span class="k">Sweep rule</span><span class="v mono">${S.cfg.sweepDays}d</span></div>
          <div class="rulechip"><span class="k">Warn at</span><span class="v mono">${S.cfg.sweepDays-S.cfg.warnDays}d</span></div>
        </div>
      </div>
      <div class="body" id="view"></div>
    </main>
  </div>`;
  renderNav(); renderPage();
}
function renderNav(){
  const past = R.visible.filter(r=>r.flag===F.PAST).length;
  const queue = R.visible.filter(r=>[F.PAST,F.APPR,F.FU].includes(r.flag) && r.noteStatus!=='Resolved').length;
  const notes = R.visible.filter(r=>r.thread.length).length;
  const role = S.user.role;
  let items;
  if(role==='Specialist'){
    // Specialist: same toolkit as a manager, but every page is scoped to their own desk.
    items=[
      {k:'sep',label:'My desk'},
      {k:'intake',label:'Upload my reports'},
      {k:'flags',label:'My accounts',pill:past||null,cls:'red'},
      {k:'coach',label:'Needs my attention',pill:queue||null,cls:'amber'},
      {k:'notes',label:'Notes from my manager',pill:notes||null,cls:'cyan'},
      {k:'swept',label:'Swept off my desk',pill:R.swept.filter(s=>s.gone).length||null},
      {k:'sep',label:'Plan'},
      {k:'cal',label:'Follow-up calendar',pill:(R.visible.filter(r=>r.followUp&&dkey(r.followUp)===dkey(today0())).length+R.visible.filter(r=>r.fuOverdue).length)||null,cls:'amber'},
      {k:'alerts',label:'My alerts',pill:R.alerts.length||null,cls:'red'},
      {k:'dash',label:'My dashboard'},
      {k:'archive',label:'My uploads',pill:S.archive.length||null},
    ];
  } else if(role==='Manager'){
    items=[
      {k:'sep',label:'Team'},
      {k:'intake',label:'Intake'},
      {k:'flags',label:'Red flags',pill:past||null,cls:'red'},
      {k:'coach',label:'Coaching queue',pill:queue||null,cls:'amber'},
      {k:'notes',label:'My coaching notes',pill:notes||null,cls:'cyan'},
      {k:'swept',label:'Swept out',pill:R.swept.filter(s=>s.gone).length||null},
      {k:'sep',label:'Read'},
      {k:'alerts',label:'Alerts',pill:R.alerts.length||null,cls:'red'},
      {k:'dash',label:'Team dashboard'},
      {k:'cal',label:'Follow-up calendar',pill:(R.visible.filter(r=>r.followUp&&dkey(r.followUp)===dkey(today0())).length+R.visible.filter(r=>r.fuOverdue).length)||null,cls:'amber'},
      {k:'archive',label:'Upload archive',pill:S.archive.length||null},
    ];
  } else { // Admin
    items=[
      {k:'sep',label:'Team'},
      {k:'intake',label:'Intake'},
      {k:'flags',label:'Red flags',pill:past||null,cls:'red'},
      {k:'coach',label:'Coaching queue',pill:queue||null,cls:'amber'},
      {k:'notes',label:'Coaching notes',pill:notes||null,cls:'cyan'},
      {k:'swept',label:'Swept out',pill:R.swept.filter(s=>s.gone).length||null},
      {k:'sep',label:'Read'},
      {k:'alerts',label:'Alerts',pill:R.alerts.length||null,cls:'red'},
      {k:'dash',label:'Team dashboard'},
      {k:'cal',label:'Follow-up calendar',pill:(R.visible.filter(r=>r.followUp&&dkey(r.followUp)===dkey(today0())).length+R.visible.filter(r=>r.fuOverdue).length)||null,cls:'amber'},
      {k:'archive',label:'Upload archive',pill:S.archive.length||null},
      {k:'sep',label:'Setup'},
      {k:'admin',label:'Admin'},
    ];
  }
  $('#nav').innerHTML = items.map(i=> i.k==='sep'
    ? `<div class="sep">${i.label}</div>`
    : `<button data-p="${i.k}" class="${S.page===i.k?'on':''}"><span>${i.label}</span>
        ${i.pill?`<span class="pill ${i.cls||''}">${i.pill}</span>`:''}</button>`).join('');
  $('#nav').querySelectorAll('button').forEach(b=>b.onclick=()=>{S.page=b.dataset.p;refresh();});
}
const TITLES = () => ({
  intake:['Intake',"Drop today's desk reports — every page builds itself from them"],
  flags:[S.user.role==='Specialist'?'My accounts':'Red flags','Worst first. Red is past the rule; amber is running out of time.'],

function statsHTML(rows){
  const n=f=>rows.filter(r=>r.flag===f).length;
  const touched = rows.filter(r=>r.pass>0).length;
  const workedN = rows.filter(r=>r.worked).length;
  const cards=[
    ['cyan',rows.length,'Accounts on desk','',''],
    ['red',n(F.PAST),`Past the ${S.cfg.sweepDays}-day rule`,F.PAST,''],
    ['amber',n(F.APPR),'Approaching the sweep',F.APPR,''],
    ['violet',n(F.FU),'Follow-up missed',F.FU,''],
    ['cyan',workedN,'Worked today','','worked'],
    ['blue',touched,'Touched — 1st pass or more','','touched'],
    ['red',money(rows.reduce((s,r)=>s+r.atRisk,0)),'Balance at risk of sweeping',null,''],
  ];
  return `<div class="stats">${cards.map(([c,val,l,flag,mode])=>{
    const clickable = flag!==null;
    const onclick = !clickable ? '' :
      mode==='touched' ? `onclick="jumpTouched()"` :
      mode==='worked' ? `onclick="jumpWorked()"` : `onclick="jumpFlag('${flag}')"`;
    return `<div class="stat ${c} ${clickable?'clk':''}" ${onclick}${clickable?' role="button" tabindex="0"':''}>
      <div class="n">${val}</div><div class="l">${l}</div>

window.jumpFlag = f => { S.filters.flag=f; S.filters.q=''; S.page='flags'; refresh(); };
window.jumpTouched = () => { S.filters={q:'',desk:S.filters.desk,flag:'',mgr:'',pass:'1+',code:'',worked:''}; S.page='flags'; refresh(); };
window.jumpWorked = () => { S.filters={q:'',desk:S.filters.desk,flag:'',mgr:'',pass:'',code:'',worked:'yes'}; S.page='flags'; refresh(); };
function wireDrop(sel,kind){
  const el=$(sel); if(!el)return;
  const pick=()=>{const i=document.createElement('input');i.type='file';i.multiple=true;
    i.accept='.xlsx,.xls,.csv';i.onchange=e=>loadFiles([...e.target.files],kind);i.click();};
  el.onclick=pick;
  el.ondragover=e=>{e.preventDefault();el.classList.add('over')};
  el.ondragleave=()=>el.classList.remove('over');
  el.ondrop=e=>{e.preventDefault();el.classList.remove('over');loadFiles([...e.dataTransfer.files],kind)};
}
async function loadFiles(files,kind){
  if(!files.length)return;
  try{
    let rows=[]; const names=[];
    for(const f of files){ rows=rows.concat(await readSheet(f)); names.push(f.name); }
    if(!rows.length){ toast('No account rows in that file — is it the desk report?'); return; }
    const dedupe=rs=>{const m=new Map();rs.forEach(r=>m.set(r.acct+'|'+r.desk,r));return [...m.values()];};
    if(kind==='today'){
      // a fresh day's drop: if yesterday is empty, pull the most recent archived
      // "today" snapshot from a PREVIOUS day and use it as yesterday automatically
      if(!S.yesterday.length){
        const prior=S.archive.find(a=>a.rows && /Today/.test(a.kind)
          && new Date(a.at).toDateString()!==new Date().toDateString());
        if(prior){
          S.yesterday=revRows(prior.rows);
          S.yestFiles=[...prior.files];
          toast(`Archived reports from ${new Date(prior.at).toLocaleDateString()} loaded as yesterday's`);
        }
      }
      S.today=dedupe([...S.today,...rows]); S.todayFiles=[...new Set([...S.todayFiles,...names])];
    }
    else { S.yesterday=dedupe([...S.yesterday,...rows]); S.yestFiles=[...new Set([...S.yestFiles,...names])]; }
    rows.forEach(r=>{ if(r.desk && !(r.desk in S.cfg.managers)) S.cfg.managers[r.desk]=''; });
    // auto-link specialist sign-ins to their desk by first name (only when unambiguous)
    const allDesks=[...new Set([...S.today,...S.yesterday].map(x=>x.desk).filter(Boolean))];
    S.cfg.users.forEach(u=>{
      if(u.role!=='Specialist'||u.desk) return;
      const hits=allDesks.filter(d=>d.toLowerCase().startsWith(u.name.toLowerCase()));
      if(hits.length===1) u.desk=hits[0];
    });
    // archive the upload against this user's profile, immediately
    S.archive.unshift({at:new Date().toISOString(), by:S.user.name, kind:kind==='today'?"Today's reports":"Yesterday's reports",
      files:names, count:rows.length, rows:serRows(rows)});
    // keep full row snapshots for the latest 6 uploads; older entries keep metadata only
    S.archive.forEach((a,i)=>{ if(i>=10) delete a.rows; });
    S.archive = S.archive.slice(0,40);
    toast(`Loaded ${rows.length} accounts — archived to your profile`); refresh();
  }catch(e){ toast('Could not read that file — '+e.message); }
}

/* -------- persistence: everything saves the moment it changes -------- */
const DKEYS=['lastWorked','lastContact','followUp'];
function serRows(rows){ return rows.map(r=>{const o={...r}; DKEYS.forEach(k=>o[k]=r[k]?r[k].toISOString():null); return o;}); }
function revRows(rows){ return (rows||[]).map(r=>{const o={...r}; DKEYS.forEach(k=>o[k]=r[k]?new Date(r[k]):null); return o;}); }
function persist(){
  S.cfg._savedAt = S.cfg._savedAt || 0;
  const payloads=[
    ()=>({cfg:S.cfg,threads:S.threads,passes:S.passes,worked:S.worked,timeOff:S.timeOff,archive:S.archive,
          today:serRows(S.today),yesterday:serRows(S.yesterday),
          todayFiles:S.todayFiles,yestFiles:S.yestFiles}),
    ()=>({cfg:S.cfg,threads:S.threads,passes:S.passes,worked:S.worked,timeOff:S.timeOff,
          archive:S.archive.map(a=>({...a,rows:undefined})),
          today:serRows(S.today),yesterday:serRows(S.yesterday),
          todayFiles:S.todayFiles,yestFiles:S.yestFiles}),
    ()=>({cfg:S.cfg,threads:S.threads,passes:S.passes,worked:S.worked}),
  ];
  for(const p of payloads){
    try{ localStorage.setItem('sweepdesk', JSON.stringify(p())); return; }catch(e){}
  }
}
function boot(){
  try{
    const d=JSON.parse(localStorage.getItem('sweepdesk')||'null');
    if(!d) return false;
    if(d.cfg) S.cfg={...S.cfg,...d.cfg};
    if(d.threads) S.threads=d.threads;
    if(d.passes) S.passes=d.passes;
    if(d.worked) S.worked=d.worked;
    if(d.timeOff) S.timeOff=d.timeOff;
    if(d.archive) S.archive=d.archive;
    if(d.today) S.today=revRows(d.today);
    if(d.yesterday) S.yesterday=revRows(d.yesterday);
    if(d.todayFiles) S.todayFiles=d.todayFiles;
    if(d.yestFiles) S.yestFiles=d.yestFiles;
    return true;
  }catch(e){ return false; }
}
function clearAll(){ S.today=[];S.yesterday=[];S.todayFiles=[];S.yestFiles=[];
  toast('Reports cleared. Notes and settings kept.'); refresh(); }

window.clearFilters = () => { S.filters={q:'',desk:'',flag:'',mgr:'',pass:'',code:'',worked:''}; renderPage(); };
function wireTools(){
  const q=$('#f-q');
  if(q) q.oninput=e=>{S.filters.q=e.target.value;renderPage();
    const el=$('#f-q'); if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);} };
  ['desk','mgr','flag','pass','code','worked'].forEach(k=>{const el=$('#f-'+k);if(el)el.onchange=e=>{S.filters[k]=e.target.value;renderPage();};});
}
function applyFilters(rows){
  const f=S.filters,q=f.q.toLowerCase();
  return rows.filter(r=>(!f.desk||r.desk===f.desk)&&(!f.mgr||r.mgr===f.mgr)&&(!f.flag||r.flag===f.flag)&&
    (!f.code || r.status===f.code) &&
    (!f.worked || (f.worked==='yes' ? !!r.worked : !r.worked)) &&
    (!f.pass || (f.pass==='0' ? r.pass===0 : f.pass==='1+' ? r.pass>0 : r.pass===+f.pass)) &&
    (!q||[r.acct,r.name,r.status,r.desk,r.property].some(v=>String(v||'').toLowerCase().includes(q))));
}
function sortRows(rows){
  const {key,dir}=S.sort;
  return [...rows].sort((a,b)=>{
    let x=a[key],y=b[key];
    if(x==null)x=dir===1?Infinity:-Infinity; if(y==null)y=dir===1?Infinity:-Infinity;
    if(x instanceof Date)x=x.getTime(); if(y instanceof Date)y=y.getTime();
    if(typeof x==='string')return dir*x.localeCompare(y);
    return dir*(x-y);
  });
}
function clockCell(r){
  if(r.days===null) return `<div class="clock ok"><span class="d">—</span><div class="track"></div></div>`;
  const cls=r.flag===F.PAST?'past':r.flag===F.APPR?'appr':'ok';
  const pct=Math.min(100,Math.round(r.days/(S.cfg.sweepDays+1)*100));
  return `<div class="clock ${cls}"><span class="d">${r.days}</span><span class="u">d</span>
    <div class="track"><div class="fill" style="width:${pct}%"></div></div></div>`;
}
const tagFor = f => f===F.NONE ? `<span class="tag t-ok">clear</span>`
  : `<span class="tag ${{[F.PAST]:'t-past',[F.APPR]:'t-appr',[F.FU]:'t-fu',[F.STAG]:'t-stag',[F.EXC]:'t-exc',[F.NODATE]:'t-none'}[f]}">${f}</span>`;
const rowCls = f => f===F.PAST?'f-past':f===F.APPR?'f-appr':f===F.FU?'f-fu':'';

const PASS_LABEL=['Untouched','1st pass','2nd pass','3rd pass','Final touch'];
const COLS=[['worked','Done'],['pass','Pass'],['acct','Account'],['status','Action code'],['desk','Specialist'],['name','Resident'],

        <td class="mono">${r.followUp

function passWidget(r){
  const dots=[1,2,3,4].map(k=>
    `<button class="pdot ${r.pass>=k?'on':''} ${k===4?'fin':''}" title="${PASS_LABEL[k]}"
       onclick="setPass('${esc(r.acct)}',${k})"></button>`).join('');
  return `<div class="passes" title="${PASS_LABEL[r.pass]}${r.passInfo?` — last by ${esc(r.passInfo.hist[r.passInfo.hist.length-1]?.by||'')}`:''}">
    ${dots}<span class="plab">${r.pass?PASS_LABEL[r.pass].replace(' pass',''):''}</span></div>`;
}
window.setPass = (acct,k) => {
  const cur = S.passes[acct]?.n || 0;
  const n = (k===cur) ? k-1 : k;          // clicking the current level steps back one
  if(n<=0) delete S.passes[acct];
  else {
    const p = S.passes[acct] || {n:0,hist:[]};
    p.n = n;
    p.hist.push({n, by:S.user.name, at:new Date().toISOString()});
    S.passes[acct]=p;
  }
  refresh();
};
window.toggleWorked = acct => {
  if(S.worked[acct]) delete S.worked[acct];
  else S.worked[acct] = {by:S.user.name, at:new Date().toISOString()};
  refresh();
};

function pNotes(v){

    byMgr[m].t+=s.total;byMgr[m].p+=s.past;byMgr[m].a+=s.appr;byMgr[m].f+=s.fu;byMgr[m].risk+=s.risk;});
  v.innerHTML = `

    </div>
    <div class="card">
      <h3>Action codes that stall</h3>
      <div class="hint">Which status codes sit untouched toward the sweep. This is where the aging actually happens.</div>
      ${top.length?top.map(([c,n])=>`
        <div class="bar-row"><span class="nm mono">${esc(c)}</span>
          <div class="bar-track"><div class="bar-seg" style="width:${n/cmax*100}%;background:var(--cyan-dim)"></div></div>

        <tr style="cursor:default"><td>${esc(m)}</td><td class="mono">${d.t}</td>
        <td class="mono" style="color:var(--red)">${d.p}</td>
        <td class="mono" style="color:var(--amber)">${d.a}</td>
        <td class="mono" style="color:var(--violet)">${d.f}</td>
        <td class="mono">${money(d.risk)}</td></tr>`).join('')}</tbody></table></div>
  </div>
  <div class="card" style="margin-top:16px">
    <h3>Specialist detail</h3>

/* ---------- FOLLOW-UP CALENDAR ---------- */
const dkey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseK = k => new Date(k+'T00:00:00');
const inRange = (k,start,end) => k>=start && k<=end;

// build the full follow-up index off the loaded reports, keyed by day
function followUpIndex(){
  const byDay={};
  R.visible.forEach(r=>{ if(r.followUp) (byDay[dkey(r.followUp)] ||= []).push(r); });
  return byDay;
}
// which time-off entries touch a given day (scoped: specialists see only their own)
function offOnDay(k){
  return S.timeOff.filter(t=>{
    if(S.user.role==='Specialist' && t.who!==S.user.name && t.who!=='Whole team') return false;
    return inRange(k, t.start, t.end);
  });
}
const OFF_KIND = {Vacation:{c:'var(--blue)',bg:'var(--blue-bg)'},Sick:{c:'var(--violet)',bg:'var(--violet-bg)'},
  'Personal / PTO':{c:'var(--cyan)',bg:'var(--cyan-bg)'},Holiday:{c:'var(--dim)',bg:'var(--grey-bg)'}};

function monthGrid(base, byDay){
  const T=today0(), y=base.getFullYear(), m=base.getMonth();
  const monthName=base.toLocaleString('en-US',{month:'long',year:'numeric'});
  const startDow=new Date(y,m,1).getDay(), daysIn=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysIn;d++) cells.push(new Date(y,m,d));
  return `
  <div class="calmonth">
    <div class="caltitle">${monthName}</div>
    <div class="calgrid">
      ${['S','M','T','W','T','F','S'].map(d=>`<div class="caldow">${d}</div>`).join('')}
      ${cells.map(d=>{
        if(!d) return '<div class="calcell empty"></div>';
        const k=dkey(d), list=byDay[k]||[];
        const past=k<dkey(T), isToday=k===dkey(T), selCls=S.calSel===k?' sel':'';
        const off=offOnDay(k);
        const weekend=[0,6].includes(d.getDay());
        // dollar weight drives an intensity dot
        const risk=list.reduce((s,r)=>s+(r.balance||0),0);
        const heavy = list.length>=5 || risk>=5000;
        const badge = list.length
          ? `<span class="calbadge ${past?'b-over':isToday?'b-today':'b-due'}">${list.length}</span>`:'';
        const offbar = off.length
          ? `<span class="caloff" style="background:${OFF_KIND[off[0].kind]?.c||'var(--dim)'}" title="${off.map(o=>esc(o.who)+' — '+esc(o.kind)).join(', ')}"></span>`:'';
        return `<div class="calcell${isToday?' today':''}${selCls}${weekend?' wknd':''}${off.length?' off':''}" onclick="calPick('${k}')">
          <span class="caldn">${d.getDate()}</span>${heavy?'<span class="calheavy" title="Heavy day — 5+ follow-ups or $5k+ at stake"></span>':''}${badge}${offbar}</div>`;
      }).join('')}
    </div>
  </div>`;
}

      <button class="btn ghost sm ${S.calTwin?'on2':''}" onclick="S.calTwin=true;renderPage()">2 months</button>
      <button class="btn ghost sm" onclick="S.calBase=new Date(today0().getFullYear(),today0().getMonth(),1);S.calSel=null;renderPage()">Today</button>

      <span class="ai"><span class="calbadge b-over" style="position:static">n</span> missed follow-ups</span>
      <span class="ai"><span class="calbadge b-today" style="position:static">n</span> due today</span>
      <span class="ai"><span class="calbadge b-due" style="position:static">n</span> upcoming</span>
      <span class="ai"><span class="calheavy" style="position:static;display:inline-block"></span> heavy day (5+ or $5k+)</span>
      <span class="ai"><span class="caloff" style="position:static;background:var(--blue)"></span> vacation</span>
      <span class="ai"><span class="caloff" style="position:static;background:var(--violet)"></span> sick</span>
      <span class="ai"><span class="caloff" style="position:static;background:var(--cyan)"></span> PTO</span>
    </div>
  </div>

  ${S.calSel?`<div class="card" style="max-width:${S.calTwin?'1180':'620'}px;margin-top:14px">
    <div class="row"><h3 style="flex:1">${selDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</h3>
      <button class="btn ghost sm" onclick="S.calSel=null;renderPage()">Close</button></div>
    ${selOff.length?`<div class="offnote">${selOff.map(o=>`<span class="tag" style="background:${OFF_KIND[o.kind]?.bg};color:${OFF_KIND[o.kind]?.c}">${esc(o.who)} — ${esc(o.kind)}</span>`).join(' ')}</div>`:''}
    ${sel.length?`<div class="hint">${sel.length} follow-up${sel.length===1?'':'s'} due · ${money(sel.reduce((s,r)=>s+(r.balance||0),0))} at stake. Click an account to open it.</div>
      ${sel.sort((a,b)=>(b.balance||0)-(a.balance||0)).map(r=>calRow(r)).join('')}`
      :`<div class="hint">No follow-ups scheduled for this day.</div>`}
  </div>`:agendaHTML(byDay, overdue)}

  ${timeOffPanel()}`;
}

function calRow(r){
  return `<div onclick="openAcct('${esc(r.acct)}')" style="display:flex;gap:12px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;font-size:12.5px">
    <span class="code">${esc(r.status||'—')}</span>
    <span style="flex:1"><b>${esc(r.name||r.acct)}</b> <span style="color:var(--dim)">· ${esc(r.desk)} · ${esc(r.acct)}</span></span>
    <span class="mono">${money(r.balance)}</span>
    ${tagFor(r.flag)}
  </div>`;
}

function agendaHTML(byDay, overdue){
  const T=today0(); const days=[];
  for(let i=0;i<7;i++){ const d=new Date(T.getFullYear(),T.getMonth(),T.getDate()+i);
    const list=byDay[dkey(d)]||[]; if(list.length) days.push([d,list]); }
  if(!days.length && !overdue.length) return `<div class="card" style="max-width:620px;margin-top:14px">
    <h3>Next 7 days</h3><div class="hint">Nothing scheduled — as follow-up dates get set in the reports they'll appear here automatically.</div></div>`;
  return `
  ${overdue.length?`<div class="card" style="max-width:620px;margin-top:14px;border-color:#542126">
    <h3 style="color:var(--red)">Already missed — recontact first</h3>
    <div class="hint">Promised and the date passed. Same-day recontact keeps the promise alive.</div>
    ${overdue.sort((a,b)=>(a.followUp||0)-(b.followUp||0)).slice(0,12).map(r=>calRow(r)).join('')}
    ${overdue.length>12?`<div style="padding:9px 0;font-size:11.5px;color:var(--dim)">…and ${overdue.length-12} more — filter accounts by FOLLOW-UP OVERDUE.</div>`:''}
  </div>`:''}
  ${days.length?`<div class="card" style="max-width:620px;margin-top:14px">
    <h3>Coming up — next 7 days</h3><div class="hint">Tap any day on the calendar to zoom in.</div>
    ${days.map(([d,list])=>`
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:${dkey(d)===dkey(T)?'var(--amber)':'var(--cyan)'};font-weight:700;margin:12px 0 2px">
        ${dkey(d)===dkey(T)?'TODAY':d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})} · ${list.length}${offOnDay(dkey(d)).length?' · <span style="color:var(--blue)">'+offOnDay(dkey(d)).map(o=>esc(o.who.split(' ')[0])+' off').join(', ')+'</span>':''}</div>
      ${list.sort((a,b)=>(b.balance||0)-(a.balance||0)).map(r=>calRow(r)).join('')}`).join('')}
  </div>`:''}`;
}

/* ---------- TIME OFF ---------- */
function timeOffPanel(){
  const byDay=followUpIndex();
  const mine = S.user.role==='Specialist';
  const list = S.timeOff.filter(t=> !mine || t.who===S.user.name || t.who==='Whole team')
    .sort((a,b)=>a.start.localeCompare(b.start));
  // impact: for each entry, how many follow-ups + $ fall on the working days off
  const impactOf = t => {
    let cnt=0, bal=0, accts=[];
    Object.entries(byDay).forEach(([k,rows])=>{
      if(!inRange(k,t.start,t.end)) return;
      rows.forEach(r=>{
        // specialist entries only count that specialist's own desk; team/other count all
        if(t.who!=='Whole team'){
          const u=S.cfg.users.find(u=>u.name===t.who);
          if(u && u.desk && r.desk!==u.desk) return;
        }
        cnt++; bal+=r.balance||0; accts.push(r);
      });
    });
    return {cnt,bal,accts};
  };
  const people = ['Whole team', ...S.cfg.users.filter(u=>u.role==='Specialist').map(u=>u.name)];
  return `<div class="card" style="max-width:${S.calTwin?'1180':'620'}px;margin-top:14px">
    <h3>Time off &amp; coverage</h3>
    <div class="hint">Add vacation, sick, or PTO days. The app shows which follow-ups fall on those days so they can be worked ahead or handed off.</div>
    ${!mine?`<div class="offform">
      <select id="off-who">${people.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
      <select id="off-kind">${Object.keys(OFF_KIND).map(k=>`<option>${k}</option>`).join('')}</select>
      <input type="date" id="off-start" value="${dkey(today0())}">
      <input type="date" id="off-end" value="${dkey(today0())}">
      <button class="btn sm" onclick="addTimeOff()">Add</button>
    </div>`:`<div class="hint" style="color:var(--dim)">Ask your manager to log time off for you — you'll see the affected accounts here.</div>`}
    ${list.length?list.map((t)=>{
      const im=impactOf(t);
      const gi=S.timeOff.indexOf(t);
      const days=Math.round((parseK(t.end)-parseK(t.start))/86400000)+1;
      return `<div class="offrow">
        <div style="flex:1">
          <div style="font-weight:600;font-size:12.5px">${esc(t.who)} <span class="tag" style="background:${OFF_KIND[t.kind]?.bg};color:${OFF_KIND[t.kind]?.c};margin-left:4px">${esc(t.kind)}</span></div>
          <div style="font-size:11.5px;color:var(--dim)">${parseK(t.start).toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${parseK(t.end).toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${days} day${days===1?'':'s'}</div>
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-weight:700;color:${im.cnt?'var(--amber)':'var(--dim)'}">${im.cnt} follow-up${im.cnt===1?'':'s'}</div>
          <div class="mono" style="font-size:11px;color:var(--dim)">${money(im.bal)} at stake</div>
        </div>
        ${im.cnt?`<button class="btn ghost sm" onclick="showOffImpact(${gi})">Which accounts</button>`:''}
        ${!mine?`<button class="x" onclick="delTimeOff(${gi})">×</button>`:''}
      </div>`;
    }).join(''):`<div style="font-size:12.5px;color:var(--dim);padding:8px 0">No time off logged yet.</div>`}
  </div>`;
}
window.addTimeOff = () => {
  const who=$('#off-who').value, kind=$('#off-kind').value;
  let start=$('#off-start').value, end=$('#off-end').value;
  if(!start||!end){ toast('Pick a start and end date'); return; }
  if(end<start){ [start,end]=[end,start]; }
  S.timeOff.push({who,kind,start,end});
  toast(`${kind} logged for ${who}`); refresh();
};
window.delTimeOff = i => { S.timeOff.splice(i,1); refresh(); };
window.showOffImpact = i => {
  const t=S.timeOff[i]; const byDay=followUpIndex();
  const rows=[];
  Object.entries(byDay).forEach(([k,rs])=>{ if(!inRange(k,t.start,t.end)) return;
    rs.forEach(r=>{
      if(t.who!=='Whole team'){ const u=S.cfg.users.find(u=>u.name===t.who); if(u&&u.desk&&r.desk!==u.desk) return; }
      rows.push({...r,_day:k});
    });
  });
  rows.sort((a,b)=> a._day.localeCompare(b._day) || (b.balance||0)-(a.balance||0));
  $('#modal-root').innerHTML=`

      setTimeout(()=>toast('Team setup loaded from the server'),700);
    }
  }catch(e){/* no setup.json — local settings apply */}
})();
</script>
<script src="./sync.js"></script>
</body>
